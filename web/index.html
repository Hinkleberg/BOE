<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Block Offset Engine Web Observer</title>
    <style>
      body { margin: 0; font-family: sans-serif; background: #0f172a; color: #e2e8f0; }
      #wrap { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
      aside { padding: 16px; border-right: 1px solid #334155; background: #111827; }
      canvas { display: block; width: 100%; height: 100%; }
      .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #2563eb; margin-right: 8px; }
      pre { font-size: 12px; white-space: pre-wrap; word-break: break-word; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <aside>
        <h2>Block Offset Engine</h2>
        <p>Development observer</p>
        <div id="status">Connecting…</div>
        <hr />
        <pre id="log"></pre>
      </aside>
      <canvas id="view"></canvas>
    </div>

    <script type="module">
      import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

      const canvas = document.getElementById('view');
      const statusEl = document.getElementById('status');
      const logEl = document.getElementById('log');

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f172a);
      const camera = new THREE.PerspectiveCamera(45, 2, 0.1, 2000);
      camera.position.set(24, 24, 48);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);

      const ambient = new THREE.AmbientLight(0xffffff, 0.7);
      const directional = new THREE.DirectionalLight(0xffffff, 1.0);
      directional.position.set(20, 30, 10);
      scene.add(ambient, directional);

      const group = new THREE.Group();
      scene.add(group);

      const material = new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.6, metalness: 0.1 });
      const geometry = new THREE.BoxGeometry(1, 1, 1);
      const instanced = new THREE.InstancedMesh(geometry, material, 4096);
      instanced.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
      group.add(instanced);

      const dummy = new THREE.Object3D();
      const blockMap = new Map();
      let instanceCount = 0;

      function addOrUpdateBlock(entry) {
        const key = `${entry.x},${entry.y},${entry.z}`;
        if (blockMap.has(key)) {
          const object = blockMap.get(key);
          dummy.position.set(entry.x, entry.y, entry.z);
          dummy.updateMatrix();
          instanced.setMatrixAt(object.instanceId, dummy.matrix);
          instanced.instanceMatrix.needsUpdate = true;
          return;
        }
        dummy.position.set(entry.x, entry.y, entry.z);
        dummy.updateMatrix();
        instanced.setMatrixAt(instanceCount, dummy.matrix);
        instanced.setColorAt(instanceCount, new THREE.Color(0x60a5fa));
        blockMap.set(key, { instanceId: instanceCount, entry });
        instanceCount += 1;
        instanced.count = instanceCount;
      }

      function renderFrame() {
        renderer.render(scene, camera);
        requestAnimationFrame(renderFrame);
      }

      function logMessage(text) {
        logEl.textContent = `${new Date().toLocaleTimeString()}\n${text}`;
      }

      const socket = new WebSocket('ws://127.0.0.1:7507/ws');
      socket.addEventListener('open', () => {
        statusEl.innerHTML = '<span class="pill">live</span> connected';
        logMessage('WebSocket connected');
      });
      socket.addEventListener('message', (event) => {
        const payload = JSON.parse(event.data);
        if (payload.type === 'snapshot') {
          payload.blocks.forEach(addOrUpdateBlock);
          logMessage(`snapshot ${payload.blocks.length} blocks`);
          return;
        }
        if (payload.type === 'block_update') {
          addOrUpdateBlock(payload);
        }
      });
      socket.addEventListener('close', () => {
        statusEl.textContent = 'Disconnected';
      });

      window.addEventListener('resize', () => {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      });

      renderFrame();
    </script>
  </body>
</html>
